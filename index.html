<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Vide Grenier - Les Ginettes</title>
    
    <!-- SDK Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        /* Conteneur pour le logo */
        .logo-container {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
        }
        .logo-container img {
            max-width: 180px; /* Taille ajustable selon vos besoins */
            height: auto;
        }

        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); width: 100%; max-width: 650px; }
        h2 { color: #2c3e50; text-align: center; border-bottom: 3px solid #fbc531; padding-bottom: 10px; margin-top: 0; }
        fieldset { border: 1px solid #dcdde1; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        legend { font-weight: bold; color: #273c75; padding: 0 10px; text-transform: uppercase; font-size: 0.9em; }
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 180px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; color: #34495e; }
        input, select { width: 100%; padding: 12px; border: 1px solid #dcdde1; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .price-tag { background: #273c75; color: white; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 1.4em; margin-top: 10px; }
        button { width: 100%; padding: 15px; background-color: #273c75; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #192a56; }
        button:disabled { background-color: #bdc3c7; }
    </style>
</head>
<body>

    <!-- Insertion du Logo Centré -->
    <div class="logo-container">
        <img src="Logo.png" alt="Logo Association Les Ginettes">
    </div>

    <div class="container">
        <h2>Pré-inscription Vide Grenier 2026</h2>
        
        <form id="videGrenierForm">
            <fieldset>
                <legend>Identité & Contact</legend>
                <div class="form-row">
                    <div class="form-group"><label>Nom</label><input type="text" id="nom" required placeholder="NOM"></div>
                    <div class="form-group"><label>Prénom</label><input type="text" id="prenom" required placeholder="Prénom"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Email</label><input type="email" id="email" required placeholder="exemple@mail.com"></div>
                    <div class="form-group"><label>Téléphone</label><input type="tel" id="tel" required pattern="[0-9]{10}" placeholder="0600000000"></div>
                </div>
            </fieldset>

            <fieldset>
                <legend>Adresse postale</legend>
                <div class="form-group"><label>Voie (N°, rue...)</label><input type="text" id="voie" required></div>
                <div class="form-row" style="margin-top:10px;">
                    <div class="form-group"><label>Code Postal</label><input type="text" id="cp" required maxlength="5"></div>
                    <div class="form-group"><label>Ville</label><input type="text" id="ville" required></div>
                </div>
            </fieldset>

            <fieldset>
                <legend>Réservation</legend>
                <div class="form-row">
                    <div class="form-group">
                        <label>Emplacement</label>
                        <select id="emplacement" onchange="calculer()">
                            <option value="Extérieur">Extérieur (8€/m)</option>
                            <option value="Intérieur">Intérieur (10€/m)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Métrage</label>
                        <select id="metrage" onchange="calculer()">
                            <option value="1">1 m</option><option value="2">2 m</option><option value="3" selected>3 m</option>
                            <option value="4">4 m</option><option value="5">5 m</option>
                        </select>
                    </div>
                </div>
                <div id="affichageTarif" class="price-tag">24 €</div>
            </fieldset>

            <button type="submit" id="btnSubmit">Envoyer l'inscription</button>
        </form>
    </div>

<script>
    // Configuration Supabase
    const S_URL = "https://dawnqgtitjrqmqnnrhky.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRhd25xZ3RpdGpycW1xbm5yaGt5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMDIxMjcsImV4cCI6MjA5Mjc3ODEyN30.M4KyikZlZ8Sb_2sTA3O4GCloLktTH4Z8p789cf89FUU";
    const _supabase = supabase.createClient(S_URL, S_KEY);

    function calculer() {
        const type = document.getElementById('emplacement').value;
        const m = parseInt(document.getElementById('metrage').value);
        const prix = (type === "Extérieur") ? 8 : 10;
        document.getElementById('affichageTarif').innerText = (prix * m) + " €";
    }

    document.getElementById('videGrenierForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.disabled = true;
        btn.innerText = "Envoi en cours...";

        const participantId = crypto.randomUUID();[cite: 1, 2]
        const total = parseFloat(document.getElementById('affichageTarif').innerText);

        try {
            // 1. Insertion Participant[cite: 1, 2]
            const { error: errP } = await _supabase.from('participants').insert([{
                id: participantId,
                nom: document.getElementById('nom').value.toUpperCase(),
                prenom: document.getElementById('prenom').value,
                email: document.getElementById('email').value,
                telephone: document.getElementById('tel').value,
                adresse_voie: document.getElementById('voie').value,
                adresse_cp: document.getElementById('cp').value,
                adresse_ville: document.getElementById('ville').value
            }]);

            if (errP) throw errP;

            // 2. Insertion Réservation[cite: 1, 2]
            const { error: errR } = await _supabase.from('reservations').insert([{
                participant_id: participantId,
                evenement_id: 1,
                metrage_reserve: parseInt(document.getElementById('metrage').value),
                total_prix: total,
                statut_dossier: 'En attente'
            }]);

            if (errR) throw errR;

            alert("✅ Inscription réussie !");[cite: 1, 2]
            document.getElementById('videGrenierForm').reset();
            calculer();

        } catch (err) {
            alert("❌ Erreur : " + err.message);[cite: 1, 2]
        } finally {
            btn.disabled = false;
            btn.innerText = "Envoyer l'inscription";
        }
    });
</script>
</body>
</html>
